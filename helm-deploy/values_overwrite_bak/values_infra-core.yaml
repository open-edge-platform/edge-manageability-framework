
---
import:
  exporter:
    enabled: true
  tenant-controller:
    enabled: true
  tenant-config:
    enabled: false
  credentials:
    enabled: true
  api:
    enabled: true
  apiv2:
    enabled: true
  inventory:
    enabled: true
credentials:
  serviceAccount:
    name: "orch-svc"
  params:
    keycloakUrl: "http://platform-keycloak.orch-platform.svc.cluster.local:8080"
    vaultUrl: "http://vault.orch-platform.svc.cluster.local:8200"
  curlImage:
    name: badouralix/curl-jq@sha256
    tag: 8ee002ae4452b23a3c70750c5c081e95334cfe9f7968fb4d67a90d4001c29d0b
    pullPolicy: IfNotPresent
api:
  image:
    pullPolicy: IfNotPresent
  serviceArgs:
    enableAuth: true
    traceURL: "orchestrator-observability-opentelemetry-collector.orch-platform.svc:4318"
    inventoryAddress: "inventory.orch-infra.svc.cluster.local:50051"
    enableTracing: false
  traefikReverseProxy:
    # We rely on the multi-tenant gateway.
    enabled: false
  # https://doc.traefik.io/traefik/migrate/v2-to-v3-details/#kubernetes-crds-api-group-traefikcontainous
  traefikApiGroup: "traefik.io/v1alpha1"
  oidc:
    name: "keycloak-api"
    oidc_env_name: "OIDC_SERVER_URL"
    oidc_server_url: "http://platform-keycloak.orch-platform.svc/realms/master"
    oidc_tls_insecure_skip_verify_env_name: "OIDC_TLS_INSECURE_SKIP_VERIFY"
    oidc_tls_insecure_skip_verify_value: "true"
  multiTenancy:
    enforceMultiTenancy: "true"
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 10m
      memory: 16Mi
  metrics:
    enabled: false
apiv2:
  image:
    pullPolicy: IfNotPresent
  serviceArgsProxy:
    enableAuth: true
    traceURL: >-
      orchestrator-observability-opentelemetry-collector.orch-platform.svc:4318
    globalLogLevel: "debug"
    enableTracing: false
  serviceArgsGrpc:
    enableAuth: true
    inventoryAddress: inventory.orch-infra.svc.cluster.local:50051
    traceURL: >-
      orchestrator-observability-opentelemetry-collector.orch-platform.svc:4318
    globalLogLevel: "debug"
    enableTracing: false
  traefikReverseProxy:
    enabled: true
    tlsOption: "gateway-tls"
  # https://doc.traefik.io/traefik/migrate/v2-to-v3-details/#kubernetes-crds-api-group-traefikcontainous
  traefikApiGroup: "traefik.io/v1alpha1"
  oidc:
    name: "keycloak-api"
    oidc_env_name: "OIDC_SERVER_URL"
    oidc_server_url: "http://platform-keycloak.orch-platform.svc/realms/master"
    oidc_tls_insecure_skip_verify_env_name: "OIDC_TLS_INSECURE_SKIP_VERIFY"
    oidc_tls_insecure_skip_verify_value: "true"
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 10m
      memory: 16Mi
  eimScenario: noobb
  apiv2IngressRoute:
    apiHostname: api.cluster.onprem
  metrics:
    enabled: false
inventory:
  image:
    pullPolicy: IfNotPresent
  inventory:
    traceURL: "orchestrator-observability-opentelemetry-collector.orch-platform.svc:4318"
  postgresql:
    pod:
      enabled: false
      image:
        tag: 16.10-bookworm
    ssl: false
    secrets: inventory-local-postgresql
    # Read only replicas enabled only for Cloud deployment with Aurora
    readOnlyReplicasEnabled: false
    readOnlyReplicasSecrets: inventory-reader-local-postgresql
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 10m
      memory: 16Mi
  serviceAccount:
    name: "orch-svc"
  miinv:
    enableTracing: false
  metrics:
    enabled: false
tenant-controller:
  managerArgs:
    inventoryAddress: "inventory.orch-infra.svc.cluster.local:50051"
    traceURL: "orchestrator-observability-opentelemetry-collector.orch-platform.svc:4318"
    enableTracing: false
    skipOSProvisioning: false
  oidc:
    oidc_server_url: "http://platform-keycloak.orch-platform.svc.cluster.local/realms/master"
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 10m
      memory: 16Mi
  serviceAccount:
    name: "orch-svc"
  vault:
    url: "http://vault.orch-platform.svc.cluster.local:8200"
    role: "orch-svc"
  metrics:
    enabled: false
tenant-config:
  curlImage:
    name: badouralix/curl-jq@sha256
    tag: 8ee002ae4452b23a3c70750c5c081e95334cfe9f7968fb4d67a90d4001c29d0b
    pullPolicy: IfNotPresent
exporter:
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 10m
      memory: 16Mi
global:
  registry:
    name: "registry-rs.edgeorchestration.intel.com/edge-orch/"
    imagePullSecrets: []
