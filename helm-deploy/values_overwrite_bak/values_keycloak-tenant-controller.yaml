
resources:
  limits:
    cpu: "64"
    memory: 64Gi
  requests:
    cpu: 1m
    memory: 1Mi
curlImage:
  name: badouralix/curl-jq@sha256
  tag: 8ee002ae4452b23a3c70750c5c081e95334cfe9f7968fb4d67a90d4001c29d0b
  pullPolicy: IfNotPresent
namespace: orch-platform
image:
  registry: registry-rs.edgeorchestration.intel.com/edge-orch
  repository: common/keycloak-tenant-controller
proxy:
  httpProxy: http://proxy-dmz.intel.com:912
  httpsProxy: http://proxy-dmz.intel.com:912
  noProxy: .caas.intel.com,certificates.intel.com,localhost,127.0.0.0/8,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12,169.254.169.254,.svc,.cluster.local,.default,.internal,.orch-platform,.orch-app,.orch-cluster,.orch-infra,.orch-database,.cattle-system,.orch-secret,.onprem,.espd.infra-host.com,.pid.infra-host.com,.espdqa.infra-host.com
imagePullSecrets: {}
serviceAccount:
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: orch-svc
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
securityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
keycloakAdmin:
  user: admin
  client: system-client
  passwordSecret:
    name: platform-keycloak # name of the secret
    key: admin-password # key of the secret
keycloak_realm: "master"
argo:
  clusterDomain: cluster.onprem
