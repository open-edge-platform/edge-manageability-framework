
containersecuritycontext:
  allowprivilegeescalation: false
server:
  image:
    tag: "1.21.3"
    # Overrides the default Image Pull Policy
    pullPolicy: IfNotPresent
  # Configure the logging verbosity for the Vault server.
  # Supported log levels include: trace, debug, info, warn, error
  logLevel: "info"
  # This configures the Vault Statefulset to create a PVC for data
  # storage when using the file or raft backend storage engines.
  # See https://www.vaultproject.io/docs/configuration/storage/index.html to know more
  dataStorage:
    # PVC not needed when using Postgres storage backend
    enabled: false
  # volumes is a list of volumes made available to all containers. These are rendered
  # via toYaml rather than pre-processed like the extraVolumes value.
  # The purpose is to make it easy to share volumes between containers.
  volumes:
    - name: vault-storage-config
      emptyDir: {}
  # volumeMounts is a list of volumeMounts for the main server container. These are rendered
  # via toYaml rather than pre-processed like the extraVolumes value.
  # The purpose is to make it easy to share volumes between containers.
  volumeMounts:
    - mountPath: /vault/userconfig/vault-storage-config
      name: vault-storage-config
      readOnly: true
  extraArgs: "-config=/vault/userconfig/vault-storage-config/storage.hcl"
  # Settings for the statefulSet used to run Vault.
  statefulSet:
    # Set the pod and container security contexts.
    # If not set, these will default to, and for *not* OpenShift:
    # pod:
    #   runAsNonRoot: true
    #   runAsGroup: {{ .Values.server.gid | default 1000 }}
    #   runAsUser: {{ .Values.server.uid | default 100 }}
    #   fsGroup: {{ .Values.server.gid | default 1000 }}
    # container:
    #   allowPrivilegeEscalation: false
    #
    securityContext:
      container:
        capabilities:
          drop:
            - ALL
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 1m
      memory: 1Mi
  standalone:
    # config is a raw string of default configuration when using a Stateful
    # deployment. Default is to use a PersistentVolumeClaim mounted at /vault/data
    # and store data there. This is only used when using a Replica count of 1, and
    # using a stateful set. This should be HCL.
    # Note: Configuration files are stored in ConfigMaps so sensitive data
    # such as passwords should be either mounted through extraSecretEnvironmentVars
    # or through a Kube secret.  For more information see:
    # https://www.vaultproject.io/docs/platform/k8s/helm/run#protecting-sensitive-vault-configurations
    config: |
      ui = true
      # Internal cluster traffic will leverage the mTLS service mesh
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
  extraInitContainers:
    # This initContainer consumes Postgres credential via secret and converts it into a config file that can be consumed by vault
    - name: storage-config
      image: alpine:3.22.2
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      command: [sh, -c]
      args:
        - echo "storage \"postgresql\" { connection_url = \"postgres://$PGUSER:$PGPASSWORD@$PGHOST:$PGPORT/$PGDATABASE\" ha_enabled=\"$HA_ENABLED\" }" > /vault/userconfig/vault-storage-config/storage.hcl
      volumeMounts:
        - mountPath: /vault/userconfig/vault-storage-config
          name: vault-storage-config
      env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              # TODO Unify the database name and secret between local and cloud deployments
              name: vault-local-postgresql
              key: PGUSER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPASSWORD
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGHOST
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPORT
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGDATABASE
        - name: HA_ENABLED
          value: "false"
    # This initContainer creates database tables for vault
    - name: init-table
      image: library/postgres:14.19-alpine3.22
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      command: [bash, -x, -c]
      args:
        - |
          EXIST=$(psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -t -A -c \
            "SELECT EXISTS (SELECT FROM pg_tables WHERE tablename  = 'vault_kv_store' OR tablename = 'vault_ha_locks');"
          )
          if [[ $EXIST == "t" ]]; then
            echo "Tables already exist, skipping initialization"
            exit 0
          fi
          psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -c \
          "CREATE TABLE vault_kv_store (
            parent_path TEXT COLLATE \"C\" NOT NULL,
            path        TEXT COLLATE \"C\",
            key         TEXT COLLATE \"C\",
            value       BYTEA,
            CONSTRAINT pkey PRIMARY KEY (path, key)
          );
          CREATE INDEX parent_path_idx ON vault_kv_store (parent_path);
          CREATE TABLE vault_ha_locks (
            ha_key      TEXT COLLATE \"C\" NOT NULL,
            ha_identity TEXT COLLATE \"C\" NOT NULL,
            ha_value    TEXT COLLATE \"C\",
            valid_until TIMESTAMP WITH TIME ZONE NOT NULL,
            CONSTRAINT ha_key PRIMARY KEY (ha_key)
          );"
      env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGUSER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPASSWORD
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGHOST
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPORT
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGDATABASE
injector:
  strategy:
    type: Recreate
  securityContext:
    container:
      capabilities:
        drop:
          - ALL
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 1m
      memory: 1Mi
global:
  imagePullSecrets:
