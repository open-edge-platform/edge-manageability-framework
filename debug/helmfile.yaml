  - name: namespace-label
    labels:
      app: namespace-label
    namespace: ns-label
    chart: edge-orch/common/charts/namespace-label
    version: 26.0.2
    values:
      - values/namespace-label.yaml
    installed: true  # always deploy

  - name: cluster-autoscaler
    labels:
      app: cluster-autoscaler
    namespace: kube-system
    chart: autoscaler/cluster-autoscaler
    version: "9.37.0"
    values:
      - values/cluster-autoscaler.yaml
    condition: enabled.cluster-autoscaler

  - name: cert-manager
    labels:
      app: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: 1.19.3
    values:
      - values/cert-manager.yaml.gotmpl
    condition: enabled.cert-manager

  - name: istio-base
