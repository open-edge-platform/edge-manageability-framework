# Includes Observability
# Use either this or enable full

# Enables Edge Node Only Observability pipeline.

argo:
  enabled:
    alerting-monitor: false
    edgenode-dashboards: false
    edgenode-observability: true
    orchestrator-dashboards: false
    orchestrator-observability: false
    orchestrator-prometheus-agent: false
  o11y:
    import:
      grafana:
        enabled: false
      alertmanager:
        enabled: false
    edgeNode:
      loki:
        write:
          resources:
            requests:
              cpu: "1m"
              memory: "1Mi"
            limits:
              cpu: "64"
              memory: "64Gi"
