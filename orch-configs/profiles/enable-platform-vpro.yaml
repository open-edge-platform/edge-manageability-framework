# Includes Platform
# Always enable this

argo:
  enabled:
    auth-service: true
    ingress-haproxy: true
    cert-manager: true
    certificate-file-server: true
    component-status: true
    copy-app-gitea-cred-to-fleet: false
    copy-ca-cert-boots-to-gateway: true
    copy-ca-cert-boots-to-infra: true
    copy-ca-cert-gateway-to-cattle: true
    copy-ca-cert-gateway-to-infra: true
    copy-ca-cert-gitea-to-app: false
    copy-ca-cert-gitea-to-cluster: false
    copy-cluster-gitea-cred-to-fleet: false
    external-secrets: true
    istio-base: false
    istio-policy: false
    istiod: false
    kiali: false
    keycloak-operator: true
    metadata-broker: true
    multitenant_gateway: true
    haproxy-ingress-pxe-boots: true
    platform-autocert: true
    platform-keycloak: true
    prometheus-crd: true
    reloader: true
    rs-proxy: true
    secrets-config: true
    secret-wait-tls-orch: true
    secret-wait-tls-boots: true
    self-signed-cert: true
    traefik-extra-objects: true
    traefik-pre: true
    traefik: true
    traefik-boots: false
    traefik-boots-extra-objects: true
    vault: true
    namespace-resource-quota: true
    k8s-metrics-server: true
    token-fs: true
