# Observability config for standalone onprem o11y env
# Use only on o11y-* profile
argo:
  enabled:
    alerting-monitor: false
    edgenode-dashboards: false
    edgenode-observability: true
    orchestrator-dashboards: false
    orchestrator-observability: false
    orchestrator-prometheus-agent: false
  o11y:
    import:
      grafana:
        enabled: false
      alertmanager:
        enabled: false
    edgeNode:
      loki:
        logRetentionPeriod: 24h
        provisioningLogRetentionPeriod: 168h
        read:
          replicas: 3
          volumeSize: 8Gi
        replicationFactor: 3
        write:
          replicas: 3
          volumeSize: 8Gi
      mimir:
        compactor:
          volumeSize: 15Gi
        distributor:
          replicas: 1
          resources:
            limits:
              memory: 12Gi
        ingester:
          replicas: 2
          resources:
            limits:
              memory: 12Gi
          volumeSize: 12Gi
        storeGateway:
          replicas: 1
          resources:
            limits:
              memory: 4Gi
          volumeSize: 5Gi
        querier:
          replicas: 3
        ruler:
          replicas: 2
        structuredConfig:
          metricsRetentionPeriod: 24h
