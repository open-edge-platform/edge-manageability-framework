---

version: 2
enable-beta-ecosystems: true

updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    commit-message:
      prefix: "Go modules"
    reviewers:
      - "dmytroye"

  # Terraform (split per directory)
  - package-ecosystem: "terraform"
    directory: "/terraform/edge-network"
    ignore: &terraform-ignore
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    schedule: &terraform-schedule
      interval: "monthly"
    commit-message: &terraform-commit
      prefix: "terraform"
    reviewers: &terraform-reviewers
      - "dmytroye"

  - package-ecosystem: "terraform"
    directory: "/terraform/orchestrator"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/terraform/edge-storage-pool"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/orchestrator/cluster"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/orchestrator/orch-load-balancer"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/orchestrator/orch-route53"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/orchestrator/pull-through-cache-proxy"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/module/lb-target-group-attachment"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/module/application-load-balancer"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/module/load-balancer"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  - package-ecosystem: "terraform"
    directory: "/pod-configs/buckets"
    ignore: *terraform-ignore
    schedule: *terraform-schedule
    commit-message: *terraform-commit
    reviewers: *terraform-reviewers

  # Helm (split per directory)
  - package-ecosystem: "helm"
    directory: "/argocd-internal/applications"
    ignore: &helm-ignore
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    schedule: &helm-schedule
      interval: daily
    open-pull-requests-limit: 5
    commit-message: &helm-commit
      prefix: "Helm"
    reviewers: &helm-reviewers
      - "dmytroye"

  - package-ecosystem: "helm"
    directory: "/argocd-internal/root-app"
    ignore: *helm-ignore
    schedule: *helm-schedule
    open-pull-requests-limit: 5
    commit-message: *helm-commit
    reviewers: *helm-reviewers

  - package-ecosystem: "helm"
    directory: "/argocd/applications"
    ignore: *helm-ignore
    schedule: *helm-schedule
    open-pull-requests-limit: 5
    commit-message: *helm-commit
    reviewers: *helm-reviewers

  - package-ecosystem: "helm"
    directory: "/argocd/root-app"
    ignore: *helm-ignore
    schedule: *helm-schedule
    open-pull-requests-limit: 5
    commit-message: *helm-commit
    reviewers: *helm-reviewers

  # Docker
  - package-ecosystem: "docker"
    directory: "/installer"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    commit-message:
      prefix: "Dockerfile"
    reviewers:
      - "dmytroye"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    commit-message:
      prefix: "Github Actions"
    reviewers:
      - "dmytroye"
