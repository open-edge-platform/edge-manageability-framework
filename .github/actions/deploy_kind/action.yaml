name: "Deploy Orchestrator on Kind"
description: "Creates a single node Kind cluster and Deploys the Orchestrator on it"
inputs:
  orch_version:
    required: false
    description: "Orchestrator version to deploy"
    default: "main"
  orch_password:
    required: true
    description: "Password to use to deploy Orchestrator"
  docker_username:
    required: true
    description: "Docker Hub username for pulling images"
  docker_password:
    required: true
    description: "Docker Hub password for pulling images"
  token:
    required: true
    description: "PAT token for private repositories"
  deployment_type:
    required: false
    description: "Type of deployment to perform"
    default: "all"
    type: choice
    options:
      - all
      - minimal

runs:
  using: "composite"
  steps:
  - name: Checkout code
    uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    with:
      repository: open-edge-platform/edge-manageability-framework
      ref: ${{ inputs.orch_version }}
      persist-credentials: false

  - name: Set up git credentials
    shell: bash
    env:
      TOKEN: ${{ inputs.token }}
    run: |
      echo "GOPRIVATE=github.com/open-edge-platform" >> $GITHUB_ENV
      git config --global url."https://$TOKEN:x-oauth-basic@github.com/".insteadOf "https://github.com/"

  - name: Setup asdf and install dependencies
    id: install-deps
    uses: open-edge-platform/orch-utils/.github/actions/setup-asdf@main  # zizmor: ignore[unpinned-uses]

  - name: Print current git hash
    shell: bash
    env:
      EDGE_MANAGEABILITY_FRAMEWORK_REV: ${{ inputs.orch_version }}
    run: echo "Current git hash is \"$EDGE_MANAGEABILITY_FRAMEWORK_REV\""

  - name: Wait for Kind cluster to be fully ready
    id: wait-kind-ready
    shell: bash
    run: |
      set -euo pipefail
      echo "==> Waiting for Kind cluster core components to be ready..."

      # Wait for node(s) to be Ready
      echo "Waiting for node(s) to be Ready..."
      kubectl wait --for=condition=Ready node --all --timeout=180s || true

      # Wait for CoreDNS to be Available (DNS must be up for many charts)
      echo "Waiting for CoreDNS deployment to be Available..."
      kubectl -n kube-system wait --for=condition=Available deployment/coredns --timeout=180s || true

      # Wait for system pods in kube-system to be Ready (best-effort)
      echo "Waiting for kube-system pods to be ready (best-effort)..."
      kubectl -n kube-system wait --for=condition=Ready pod --all --timeout=180s || true

      # local-path provisioner may be in either 'local-path-storage' or 'local-path' namespace - try both
      if kubectl get ns local-path-storage >/dev/null 2>&1; then
        echo "Found local-path-storage namespace, waiting for provisioner..."
        kubectl -n local-path-storage wait --for=condition=Available deploy --all --timeout=180s || true
        kubectl -n local-path-storage wait --for=condition=Ready pod --all --timeout=180s || true
      elif kubectl get ns local-path >/dev/null 2>&1; then
        echo "Found local-path namespace, waiting for provisioner..."
        kubectl -n local-path wait --for=condition=Available deploy --all --timeout=180s || true
        kubectl -n local-path wait --for=condition=Ready pod --all --timeout=180s || true
      else
        echo "No local-path provisioner namespace detected; skipping local-path wait"
      fi

      # If MetalLB installed, wait for its controller & speaker
      if kubectl get ns metallb-system >/dev/null 2>&1; then
        echo "MetalLB namespace found — waiting for controller and speaker..."
        kubectl -n metallb-system wait --for=condition=Available deployment/controller --timeout=180s || true
        kubectl -n metallb-system wait --for=condition=Ready daemonset/speaker --timeout=180s || true
        kubectl -n metallb-system wait --for=condition=Ready pod --all --timeout=180s || true
      else
        echo "No metallb-system namespace detected; skipping MetalLB wait"
      fi

      # Show current pod status for diagnostics
      echo "Current cluster pods (all namespaces):"
      kubectl get pods -A --no-headers || true

      echo "Kind cluster readiness gate completed."

  - name: Deploy External Orchestrator
    id: deploy-external-orchestrator
    env:
      GIT_USER: "git"
      GIT_TOKEN: ${{ inputs.token }}
      EDGE_MANAGEABILITY_FRAMEWORK_REV: ${{ inputs.orch_version }}
      ORCH_DEFAULT_PASSWORD: ${{ inputs.orch_password }}
      DOCKERHUB_TOKEN: ${{ inputs.docker_password }}
      DOCKERHUB_USERNAME: ${{ inputs.docker_username }}
      DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
    shell: bash
    run: |
      set -euo pipefail
      set +x
      echo "Starting to deploy Orchestrator..."

      # Final quick check before deploy
      echo "Quick cluster health check before running mage deploy:"
      kubectl get nodes -o wide || true
      kubectl get pods -n kube-system || true
      kubectl get sc || true

      # Retry wrapper for transient failures (3 attempts)
      attempts=0
      max_attempts=3
      backoff_seconds=15

      while [ $attempts -lt $max_attempts ]; do
        attempts=$((attempts + 1))
        echo "Deploy attempt #${attempts} of ${max_attempts}..."

        if [ "${DEPLOYMENT_TYPE}" = "minimal" ]; then
          echo "Deploying minimal Orchestrator setup..."
          if mage deploy:kindMinimal; then
            echo "Deploy succeeded on attempt #${attempts}"
            break
          fi
        else
          echo "Deploying full Orchestrator setup..."
          if mage deploy:kindAll; then
            echo "Deploy succeeded on attempt #${attempts}"
            break
          fi
        fi

        echo "Deploy attempt #${attempts} failed."
        if [ $attempts -lt $max_attempts ]; then
          echo "Sleeping ${backoff_seconds}s before retry..."
          sleep ${backoff_seconds}
        fi
      done

      if [ $attempts -ge $max_attempts ]; then
        echo "ERROR: Deployment failed after ${max_attempts} attempts."
        # Dump diagnostics to help debugging
        echo "=== Diagnostics ==="
        kubectl get pods -A -o wide || true
        kubectl get pvc -A || true
        kubectl describe nodes || true
        exit 1
      fi

      echo "Orchestrator deployment done!"

  - name: Get Root App Status
    shell: bash
    if: ${{ always() && steps.deploy-external-orchestrator.conclusion != 'success' }}
    run: |
      echo "Root App Status:"
      kubectl get pods -o wide -A
      kubectl -n dev get applications root-app -o yaml || true

  - name: Verify Kind Deployment
    id: verify-kind-deployment
    shell: bash
    run: |
      echo "Starting to verify Orchestrator deployment..."
      mage deploy:waitUntilComplete
      echo "Orchestrator deployment verified!"
      mage router:stop router:start
      echo "Router restarted"

  - name: Setup Test environment
    shell: bash
    run: |
      sudo awk -i inplace '/BEGIN ORCH DEVELOPMENT HOSTS/,/END ORCH DEVELOPMENT HOSTS/ { next } 1' /etc/hosts
      sudo awk -i inplace '/BEGIN ORCH SRE DEVELOPMENT HOST/,/END ORCH SRE DEVELOPMENT HOST/ { next } 1' /etc/hosts
      mage gen:hostfileTraefik | sudo tee -a /etc/hosts > /dev/null
      echo "Updated Hostfile entries!"
      mage gen:orchCa deploy:orchCa
