name: Security Scans

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - "*"
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37  # v0.31.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37  # v0.31.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          scanners: secret
          format: table
          exit-code: "1"

  helmfile-scan:
    name: Helmfile Config Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Trivy misconfiguration scan on helmfile-deploy
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37  # v0.31.0
        with:
          scan-type: config
          scan-ref: helmfile-deploy
          trivy-config: trivy.yaml
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
