name: Contributing Guide Reminder

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions: {}

jobs:
  remind-contributing:
    permissions:
      contents: read
    name: Remind Contributor
    runs-on: ubuntu-latest
    steps:
      - name: Check if contributor is first-time
        id: first-time
        uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d  # v3.1.0
        with:
          repo_token: ${{ secrets.SYS_EMF_GH_TOKEN }}
          issue_message: "Thank you for your contribution! Please make sure to review our [Contributing Guide](https://docs.openedgeplatform.intel.com/edge-manage-docs/main/developer_guide/contributor_guide/index.html)."
          pr_message: "Thank you for your contribution! Please make sure to review our [Contributing Guide](https://docs.openedgeplatform.intel.com/edge-manage-docs/main/developer_guide/contributor_guide/index.html)."
