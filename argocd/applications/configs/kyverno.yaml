# Deploy minimally viable HA config. See https://kyverno.io/docs/installation/methods/#high-availability
# Migrate to v1.13 https://kyverno.io/docs/installation/upgrading/#upgrading-to-kyverno-v113
admissionController:
  replicas: 3
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - '*'
          resources:
            - '*'
          verbs:
            - get
            - list
            - watch
backgroundController:
  replicas: 2
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - '*'
          resources:
            - '*'
          verbs:
            - get
            - list
            - watch
cleanupController:
  replicas: 2
reportsController:
  replicas: 2
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - '*'
          resources:
            - '*'
          verbs:
            - get
            - list
            - watch

crds:
  migration:
    # -- Enable CRDs migration using helm post upgrade hook
    # disabling CRD migration as a workaround to https://github.com/kyverno/kyverno/issues/10283
    enabled: false

# Migrate to v1.13 https://kyverno.io/docs/installation/upgrading/#upgrading-to-kyverno-v113
features:
  policyExceptions:
    enabled: true
    namespace: 'kyverno'

# Using dummy labels workaround as explained in https://github.com/kyverno/kyverno/issues/15116
# to address migration issues related to missing labels in kyverno-api deployment.
# This is a temporary solution and should be removed once the underlying issue is resolved in Kyverno.
kyverno-api:
  annotations:
    meta.helm.sh/release-name: kyverno
  labels:
    app.kubernetes.io/managed-by: Helm
