image:
  pullPolicy: IfNotPresent
fullnameOverride: app-orch-catalog
service:
  restProxy:
    port: 8081
ingress:
  enabled: false
# traefikReverseProxy: TLS settings used by the IngressRoute template (secretName, gatewayNamespace).
# Note: traefikReverseProxy has no enabled flag in the catalog IngressRoute template; use ingressRoute.enabled instead.
traefikReverseProxy:
  secretName: tls-orch          ## must be created in orch-gateway namespace
  gatewayNamespace: orch-gateway
ingressRoute:
  enabled: true
openidc:
  issuer: http://platform-keycloak.orch-platform.svc/realms/master
storage:
  size: 1Gi
postgres:
  enabled: false
  ssl: false
  secrets: app-orch-catalog-local-postgresql
useSecretsService: true
istio-proxy:
  securityContext:
    readOnlyRootFilesystem: true
application-catalog-rest-proxy:
  securityContext:
    readOnlyRootFilesystem: true
application-catalog-server:
  securityContext:
    readOnlyRootFilesystem: true
openpolicyagent:
  securityContext:
    readOnlyRootFilesystem: true
resources: null
vaultServerAddress: http://vault.orch-platform.svc.cluster.local:8200
serviceAccount: orch-svc

