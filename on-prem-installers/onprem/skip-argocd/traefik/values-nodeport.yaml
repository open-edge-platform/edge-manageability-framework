globalArguments: []

providers:
  kubernetesCRD:
    allowCrossNamespace: true
    namespaces:
      - default
      - orch-gateway
      - orch-platform
      - orch-app
      - orch-infra
      - orch-cluster
      - orch-harbor
      - cattle-system
      - connect-gateway
      - orch-ui
      - orch-secret
      - orch-iam

ingressRoute:
  dashboard:
    enabled: false

logs:
  general:
    format: json
  access:
    enabled: true
    format: json

volumes:
  - name: jwt-plugin
    type: configMap
    mountPath: ./traefik-jwt-plugin/

additionalVolumeMounts:
  - name: jwt-plugin
    mountPath: ./plugins-local/src/github.com/team-carepay/traefik-jwt-plugin/

additionalArguments:
  - --experimental.localPlugins.jwt.moduleName=github.com/team-carepay/traefik-jwt-plugin

metrics:
  prometheus:
    buckets: "0.1,0.3,0.6,0.9,1.2,1.5,2.0,2.5,5.0,10.0"
    service:
      enabled: true

deployment:
  podAnnotations:
    traffic.sidecar.istio.io/excludeInboundPorts: "8000,8443,8080,4433"
    traffic.sidecar.istio.io/excludeOutboundPorts: "4433"
    traffic.sidecar.istio.io/excludeOutboundIPRanges: "10.96.0.1/32"

resources: {}
nodeSelector: {}
tolerations: []

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

# ✅ NodePort config
service:
  type: NodePort

ports:
  web:
    expose:
      default: false

  websecure:
    nodePort: 30443
    expose:
      default: true
    middlewares:
      - orch-gateway-rate-limit@kubernetescrd

  tcpamt:
    port: 4433
    exposedPort: 4433
    expose:
      default: true
    protocol: TCP
    middlewares:
      - orch-gateway-tcp-rate-limit@kubernetescrd
