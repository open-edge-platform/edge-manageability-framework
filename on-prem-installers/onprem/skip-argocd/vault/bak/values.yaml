global:
  imagePullSecrets: []

server:
  image:
    repository: "hashicorp/vault"
    tag: "1.21.3"
    pullPolicy: IfNotPresent
  logLevel: "info"

  # HA or standalone
  ha:
    enabled: false    # set true if you want HA
    replicas: 1

  # Listener configuration
  config: |
    ui = true
    listener "tcp" {
      address = "[::]:8200"
      cluster_address = "[::]:8201"
      tls_disable = 1
    }

  # Security contexts
  statefulSet:
    securityContext:
      container:
        capabilities:
          drop: ["ALL"]
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault

  # Volumes & mounts
  volumes:
    - name: vault-storage-config
      emptyDir: {}
  volumeMounts:
    - name: vault-storage-config
      mountPath: /vault/userconfig/vault-storage-config
      readOnly: true
  extraArgs: "-config=/vault/userconfig/vault-storage-config/storage.hcl"

  # Init containers for local PostgreSQL backend
  extraInitContainers:
    - name: storage-config
      image: alpine:3.22.2
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      command: [sh, -c]
      args:
        - echo "storage \"postgresql\" { connection_url = \"postgres://$PGUSER:$PGPASSWORD@$PGHOST:$PGPORT/$PGDATABASE\" ha_enabled=\"$HA_ENABLED\" }" > /vault/userconfig/vault-storage-config/storage.hcl
      volumeMounts:
        - name: vault-storage-config
          mountPath: /vault/userconfig/vault-storage-config
      env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGUSER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPASSWORD
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGHOST
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPORT
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGDATABASE
        - name: HA_ENABLED
          value: "false"

    - name: init-table
      image: postgres:14.19-alpine3.22
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      command: [bash, -c]
      args:
        - |
          EXIST=$(psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -t -A -c \
            "SELECT EXISTS (SELECT FROM pg_tables WHERE tablename = 'vault_kv_store' OR tablename = 'vault_ha_locks');")
          if [[ $EXIST == "t" ]]; then
            echo "Tables already exist, skipping initialization"
            exit 0
          fi
          psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -c \
          "CREATE TABLE vault_kv_store (
            parent_path TEXT COLLATE \"C\" NOT NULL,
            path        TEXT COLLATE \"C\",
            key         TEXT COLLATE \"C\",
            value       BYTEA,
            CONSTRAINT pkey PRIMARY KEY (path, key)
          );
          CREATE INDEX parent_path_idx ON vault_kv_store (parent_path);
          CREATE TABLE vault_ha_locks (
            ha_key      TEXT COLLATE \"C\" NOT NULL,
            ha_identity TEXT COLLATE \"C\" NOT NULL,
            ha_value    TEXT COLLATE \"C\",
            valid_until TIMESTAMP WITH TIME ZONE NOT NULL,
            CONSTRAINT ha_key PRIMARY KEY (ha_key)
          );"
      env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGUSER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPASSWORD
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGHOST
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGPORT
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: vault-local-postgresql
              key: PGDATABASE
  vault:
    ha: false
    replicas: 1
    autoInit: true
    autoUnseal: false # .Values.argo.aws must be defined to use autoUnseal
    authorizedAddrs: 0.0.0.0/0 # Comma-separated CIDR for allowed X-Forwarded-For
