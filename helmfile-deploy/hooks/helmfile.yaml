#
# Helmfile-based deployment for Edge Manageability Framework
# Replaces ArgoCD-based deployment with direct helm chart releases
#
# Usage:
#   Full deployment:
#     helmfile -e onprem sync
#     helmfile -e onprem-eim sync
#     helmfile -e aws sync
#
#   Individual chart install/uninstall:
#     helmfile -e onprem -l app=traefik sync        # install single chart
#     helmfile -e onprem -l app=traefik destroy      # uninstall single chart
#     helmfile -e onprem -l app=traefik diff         # preview changes
#
#   Multiple charts:
#     helmfile -e onprem -l "app=traefik" -l "app=haproxy" sync
#
#   List available releases:
#     helmfile -e onprem list

environments:
  dev:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/dev.yaml.gotmpl
  dev-minimal:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/dev-minimal.yaml.gotmpl
  onprem:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem.yaml.gotmpl
  onprem-1k:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem-1k.yaml.gotmpl
  onprem-oxm:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem-oxm.yaml.gotmpl
  onprem-explicit-proxy:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem-explicit-proxy.yaml.gotmpl
  bkc:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/bkc.yaml.gotmpl
  aws:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/aws.yaml.gotmpl
  onprem-vpro:
    values:
      - environments/onprem-eim-settings.yaml.gotmpl
      - environments/profile-vpro.yaml.gotmpl
  onprem-eim:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem-eim.yaml.gotmpl
  onprem-eim-co:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem-eim-co.yaml.gotmpl
  onprem-eim-co-ao:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem-eim-co-ao.yaml.gotmpl
  onprem-eim-co-ao-o11y:
    values:
      - environments/defaults.yaml.gotmpl
      - environments/onprem-eim-co-ao-o11y.yaml.gotmpl

---

helmDefaults:
  createNamespace: true
  wait: true
  waitForJobs: true
  timeout: 180

repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts
  - name: hashicorp
    url: https://helm.releases.hashicorp.com
  - name: traefik
    url: https://helm.traefik.io/traefik
  - name: kyverno
    url: https://kyverno.github.io/kyverno
  - name: fleet
    url: https://rancher.github.io/fleet-helm-charts/
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: haproxy
    url: https://haproxytech.github.io/helm-charts
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: prometheus
    url: https://prometheus-community.github.io/helm-charts
  - name: stakater
    url: https://stakater.github.io/stakater-charts
  - name: harbor
    url: https://helm.goharbor.io
  - name: cnpg
    oci: true
    url: ghcr.io/cloudnative-pg/charts
{{- if eq (env "EMF_ENABLE_ISTIO" | default "true") "true" }}
  - name: kiali
    url: https://kiali.org/helm-charts
{{- end }}
{{- if eq (env "EMF_ENABLE_CO" | default "false") "true" }}
  - name: capi-operator
    url: https://kubernetes-sigs.github.io/cluster-api-operator
{{- end }}
{{- if eq (env "EMF_ENABLE_AWS" | default "false") "true" }}
  - name: autoscaler
    url: https://kubernetes.github.io/autoscaler
  - name: eks
    url: https://aws.github.io/eks-charts
{{- end }}
  - name: edge-orch
    oci: true
    url: {{ env "EMF_REGISTRY" | default "registry-rs.edgeorchestration.intel.com" }}/edge-orch
  - name: edge-orch-rs
    oci: true
    url: {{ env "EMF_REGISTRY" | default "registry-rs.edgeorchestration.intel.com" }}/edge-orch

releases:
  #############################################################################
  # Wave 1
  #############################################################################

  - name: keycloak-operator
    labels:
      app: keycloak-operator
    namespace: orch-platform
    chart: edge-orch/common/charts/keycloak-operator
    version: 26.1.2
    values:
      - values/keycloak-operator.yaml
    condition: keycloak-operator.enabled



  - name: postgresql-operator
    labels:
      app: postgresql-operator
    namespace: postgresql-operator
    chart: cnpg/cloudnative-pg
    version: 0.27.1
    values:
      - values/postgresql-operator.yaml
    condition: postgresql-operator.enabled


  #############################################################################
  # Wave 90
  #############################################################################

  - name: cluster-autoscaler
    labels:
      app: cluster-autoscaler
    namespace: kube-system
    chart: autoscaler/cluster-autoscaler
    version: "9.37.0"
    values:
      - values/cluster-autoscaler.yaml
    condition: cluster-autoscaler.enabled
    needs:
      - postgresql-operator/postgresql-operator


  - name: namespace-label
    labels:
      app: namespace-label
    namespace: ns-label
    chart: edge-orch/common/charts/namespace-label
    version: 26.0.2
    values:
      - values/namespace-label.yaml.gotmpl
    installed: true  # always deploy
    needs:
      - postgresql-operator/postgresql-operator


  #############################################################################
  # Wave 100
  #############################################################################

  - name: cert-manager
    labels:
      app: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: 1.19.3
    values:
      - values/cert-manager.yaml.gotmpl
    condition: cert-manager.enabled
    needs:
      - ns-label/namespace-label


  - name: external-secrets
