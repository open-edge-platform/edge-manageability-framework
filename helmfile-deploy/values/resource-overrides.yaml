# Single resource override file for all releases.
# Sets resources to null (removes limits) so CPU-heavy tasks are not throttled.
# Helm ignores unknown top-level keys, so this file can be safely applied to
# every release — each chart picks up only the keys it recognizes.

# ── Standalone charts (root-level resources) ─────────────────────────────────
resources:
  requests:
    cpu: "1m"
    memory: "1Mi"
  limits:
    cpu: "64"
    memory: "64Gi"

