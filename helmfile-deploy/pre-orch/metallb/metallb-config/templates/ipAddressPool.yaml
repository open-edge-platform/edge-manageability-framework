---
{{- $ns := default .Release.Namespace .Values.namespace }}
{{- $singleIP := .Values.singleIpMode | default false }}

{{- if $singleIP }}
# ── Single-IP mode: one shared pool for all services ──────────────────────
{{- $ip := required "metallb-config.TraefikIP (or TraefikIP) must be set" (default .Values.TraefikIP (index .Values "metallb-config" "TraefikIP")) }}
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: orch-pool
  namespace: {{ $ns }}
spec:
  addresses:
  {{- if contains "/" $ip }}
  - "{{ $ip }}"
  {{- else }}
  - "{{ $ip }}/32"
  {{- end }}
  autoAssign: false
  avoidBuggyIPs: true

{{- else }}
# ── Multi-IP mode: separate pools per service ─────────────────────────────
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: traefik
  namespace: {{ $ns }}
spec:
  addresses:
  {{- $ip := required "metallb-config.TraefikIP (or TraefikIP) must be set" (default .Values.TraefikIP (index .Values "metallb-config" "TraefikIP")) }}
  {{- if contains "/" $ip }}
  - "{{ $ip }}"
  {{- else }}
  - "{{ $ip }}/32"
  {{- end }}
  autoAssign: true
  avoidBuggyIPs: true
  serviceAllocation:
    priority: 1
    namespaces:
      - {{ default "orch-gateway" .Values.serviceNamespaces.traefik }}

---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: haproxy-controller
  namespace: {{ $ns }}
spec:
  addresses:
  {{- $ip := required "metallb-config.HaproxyIP (or HaproxyIP) must be set" (default .Values.HaproxyIP (index .Values "metallb-config" "HaproxyIP")) }}
  {{- if contains "/" $ip }}
  - "{{ $ip }}"
  {{- else }}
  - "{{ $ip }}/32"
  {{- end }}
  autoAssign: true
  avoidBuggyIPs: true
  serviceAllocation:
    priority: 1
    namespaces:
      - {{ default "orch-boots" .Values.serviceNamespaces.haproxy }}
{{- end }}
