keycloak:
  additionalOptions:
    - name: db-url-host
      secret:
        key: PGHOST
        name: platform-keycloak-local-postgresql
    - name: db-url-port
      secret:
        key: PGPORT
        name: platform-keycloak-local-postgresql
    - name: db-url-database
      secret:
        key: PGDATABASE
        name: platform-keycloak-local-postgresql
    - name: hostname-strict
      value: "false"
    - name: http-relative-path
      value: /
    - name: http-enabled
      value: "true"
    - name: db-url-properties
      value: ?tcpKeepAlives=true&socketTimeout=120&connectTimeout=120
    - name: http-management-port
      value: "9000"
    - name: spi-login-protocol-openid-connect-legacy-logout-redirect-uri
      value: "true"
    - name: spi-brute-force-protector-default-brute-force-detector-allow-concurrent-requests
      value: "true"
    - name: log-level
      value: INFO
    - name: log-console-output
      value: json
  database:
    passwordSecret:
      key: PGPASSWORD
      name: platform-keycloak-local-postgresql
    usernameSecret:
      key: PGUSER
      name: platform-keycloak-local-postgresql
keycloakConfigCli:
  configMap:
    labels:
      app.kubernetes.io/instance: keycloak-config-cli
      app.kubernetes.io/name: keycloak-config-cli
    name: keycloak-config-cli-realm-master
    namespace: orch-platform
  enabled: true
  job:
    backoffLimit: 5
    container:
      env:
        - name: KEYCLOAK_URL
          value: http://platform-keycloak.orch-platform.svc.cluster.local/
        - name: KEYCLOAK_USER
          valueFrom:
            secretKeyRef:
              key: username
              name: platform-keycloak
        - name: KEYCLOAK_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: platform-keycloak
        - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
          value: "true"
        - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
          value: 120s
        - name: IMPORT_VARSUBSTITUTION_ENABLED
          value: "true"
        - name: IMPORT_FILES_LOCATIONS
          value: /config/*
        - name: IMPORT_MANAGED_GROUP
          value: no-delete
        - name: IMPORT_MANAGED_REQUIRED_ACTION
          value: no-delete
        - name: IMPORT_MANAGED_ROLE
          value: no-delete
        - name: IMPORT_MANAGED_CLIENT
          value: no-delete
        - name: IMPORT_MANAGED_USER
          value: no-delete
        - name: IMPORT_REMOTE_STATE_ENABLED
          value: "true"
        - name: LOGGING_LEVEL_ROOT
          value: INFO
        - name: LOGGING_LEVEL_KEYCLOAKCONFIGCLI
          value: DEBUG
      image: docker.io/adorsys/keycloak-config-cli:6.4.0-26
      imagePullPolicy: IfNotPresent
      name: keycloak-config-cli
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 512Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - mountPath: /config
          name: config
          readOnly: true
        - mountPath: /tmp
          name: tmp
    initContainers:
      - command:
          - sh
          - -c
          - |
            set -e
            echo "Waiting for Keycloak to be ready..."
            MAX_ATTEMPTS=60
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              if timeout 2 sh -c "echo '' | nc -w1 platform-keycloak.orch-platform.svc 8080" >/dev/null 2>&1; then
                echo "Keycloak port 8080 is open!"
                exit 0
              fi
              ATTEMPT=$((ATTEMPT + 1))
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - Waiting for Keycloak..."
              sleep 5
            done
            echo "WARNING: Keycloak did not respond, but proceeding anyway..."
            exit 0
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: wait-for-keycloak
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
    labels:
      app.kubernetes.io/instance: keycloak-config-cli
      app.kubernetes.io/name: keycloak-config-cli
      app.kubernetes.io/version: 6.4.0
    name: keycloak-config-cli
    namespace: orch-platform
    podLabels:
      sidecar.istio.io/inject: "false"
    restartPolicy: Never
    securityContext:
      fsGroup: 65534
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
    ttlSecondsAfterFinished: 3600
    volumes:
      - configMap:
          defaultMode: 292
          name: keycloak-config-cli-realm-master
        name: config
      - emptyDir: {}
        name: tmp
  serviceAccount:
    labels:
      app.kubernetes.io/instance: keycloak-config-cli
      app.kubernetes.io/name: keycloak-config-cli
      app.kubernetes.io/version: 6.4.0
    name: keycloak-config-cli
    namespace: orch-platform
