        cpu: "64"
        memory: 64Gi
      requests:
        cpu: 200m
        memory: 256Mi
  tinkerbell_hegel: null
  tinkerbell_smee:
    additionalKernelArgs:
      - http_proxy=http://proxy-dmz.intel.com:912
      - https_proxy=http://proxy-dmz.intel.com:912
      - no_proxy=.caas.intel.com,certificates.intel.com,localhost,127.0.0.0/8,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12,169.254.169.254,.svc,.cluster.local,.default,.internal,.orch-platform,.orch-app,.orch-cluster,.orch-infra,.orch-database,.cattle-system,.orch-secret,.onprem,.espd.infra-host.com,.pid.infra-host.com,.espdqa.infra-host.com
      - HTTP_PROXY=http://proxy-dmz.intel.com:912
      - HTTPS_PROXY=http://proxy-dmz.intel.com:912
      - NO_PROXY=.caas.intel.com,certificates.intel.com,localhost,127.0.0.0/8,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12,169.254.169.254,.svc,.cluster.local,.default,.internal,.orch-platform,.orch-app,.orch-cluster,.orch-infra,.orch-database,.cattle-system,.orch-secret,.onprem,.espd.infra-host.com,.pid.infra-host.com,.espdqa.infra-host.com
      - DEBUG=false
      - TIMEOUT=120s
      - syslog_host=127.0.0.1
    traefikReverseProxy:
      enabled: true
      nginxDnsname: tinkerbell-haproxy.cluster.onprem
  tinkerbell_tink:
    controller:
      enabled: true
    enabled: true
    server:
      enabled: true
      metrics:
        enabled: false
  traefikApiGroup: traefik.io/v1alpha1
  traefikReverseProxy:
    enabled: true
    gatewayNamespace: orch-gateway
    nginxDnsname: tinkerbell-haproxy.cluster.onprem
    tinkServerDnsname: tinkerbell-server.cluster.onprem
