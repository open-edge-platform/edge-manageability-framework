  pvc:
    storageClassName: openebs-hostpath
  resources:
    limits:
      cpu: "64"
      memory: 64Gi
    requests:
      cpu: 1m
      memory: 1Mi
  service:
    enableIO: true
  serviceAccount:
    name: orch-svc
  traefikApiGroup: traefik.io/v1alpha1
  traefikReverseProxy:
    enabled: true
    gatewayNamespace: orch-gateway
    host:
      grpc:
        name: onboarding-node.cluster.onprem
      stream:
        name: onboarding-stream.cluster.onprem
    secretName: tls-orch
    tlsOption: gateway-tls
