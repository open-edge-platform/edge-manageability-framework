# Default proxy values — always included so .Values.proxy.* references
# never fail when EMF_HTTP_PROXY is not set.  The environment file
# (onprem-eim.yaml.gotmpl etc.) overwrites these when proxy is configured.

proxy:
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""
  enHttpProxy: ""
  enHttpsProxy: ""
  enFtpProxy: ""
  enSocksProxy: ""
  enNoProxy: ""
