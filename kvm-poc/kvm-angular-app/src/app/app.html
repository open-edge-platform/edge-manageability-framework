<div class="kvm-app">
  <header class="header">
    <h1>🖥️ Intel AMT KVM Viewer</h1>
    <p class="subtitle">Remote Desktop via Go Server + MPS</p>
    <div class="status" [ngClass]="'status-' + deviceState()">
      <span class="status-label">{{ stateLabel() }}</span>
    </div>
  </header>

  <div class="controls" *ngIf="!showViewer()">
    <div class="control-group">
      <label>MPS Host:</label>
      <input [(ngModel)]="mpsHost" [disabled]="isConnecting()" />
    </div>

    <div class="control-group">
      <label>Device GUID:</label>
      <input [(ngModel)]="deviceGuid" [disabled]="isConnecting()" />
    </div>

    <div class="control-group">
      <label>JWT Token:</label>
      <input type="password" [(ngModel)]="jwtToken" [disabled]="isConnecting()" 
             placeholder="Enter JWT token from Keycloak" />
    </div>

    <div class="consent-panel">
      <h3>User Consent</h3>
      <p class="consent-copy">Request consent before starting the KVM session. The device will display a 6-digit code.</p>

      <div class="button-group consent-actions" *ngIf="!consentRequested && !consentApproved">
        <button class="btn btn-primary" (click)="requestConsentCode()" [disabled]="requestingConsent || !jwtToken || !deviceGuid">
          {{ requestingConsent ? 'Requesting Consent...' : 'Request Consent Code' }}
        </button>
      </div>

      <div class="consent-entry" *ngIf="consentRequested && !consentApproved">
        <label>Consent Code</label>
        <input [(ngModel)]="consentCode" maxlength="6" placeholder="Enter 6-digit code" />
        <div class="button-group consent-actions">
          <button class="btn btn-primary" (click)="submitConsentCode()" [disabled]="submittingConsent || consentCode.length !== 6">
            {{ submittingConsent ? 'Submitting...' : 'Submit Consent Code' }}
          </button>
          <button class="btn btn-secondary" (click)="resetConsentFlow()" [disabled]="submittingConsent">
            Cancel
          </button>
        </div>
      </div>

      <div class="consent-approved-banner" *ngIf="consentApproved">
        Consent approved. Start the KVM session.
      </div>

      <div class="consent-message" *ngIf="consentMessage">
        {{ consentMessage }}
      </div>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" (click)="connect()" [disabled]="isConnecting() || !jwtToken || !consentApproved">
        {{ isConnecting() ? 'Connecting...' : 'Connect to KVM' }}
      </button>
    </div>
  </div>

  <div class="controls" *ngIf="showViewer()">
    <button class="btn btn-secondary" (click)="disconnect()">
      Disconnect
    </button>
  </div>

  <!-- Custom KVM Viewer Component -->
  <div class="kvm-container" *ngIf="showViewer()">
    <app-kvm-viewer 
      [kvmData$]="kvmService.kvmData$"
      [epoch]="kvmService.connectionId$ | async"
      [showStats]="true">
    </app-kvm-viewer>
  </div>

  <!-- Logs -->
  <div class="logs" *ngIf="logs().length > 0">
    <h3>Connection Logs</h3>
    <div class="log-entries">
      <div *ngFor="let log of logs()" class="log-entry">{{ log }}</div>
    </div>
  </div>
</div>
